services:
  - type: web
    name: badgers-on-boats
    env: docker
    plan: starter
    autoDeploy: true
    envVars:
      - key: ADMIN_PIN
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 4173
    disk:
      name: kayak-trip-data
      mountPath: /app/data
      sizeGB: 1
